<!DOCTYPE html>
<html>
	<head>
		<meta charset="ISO-8859-1">
		<!-- Bootstrap CSS -->
		<link th:rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}"/>
		<!-- Font Awesome -->
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
		<title>java-fizzbuzz</title>
	</head>
	<body>
		<div class="container-fluid bg-black min-vh-100">
			<div class="row text-white">
				<div class="col-12 text-center py-5">
					<h1>FizzBuzz</h1>
				</div>
				<div class="col-12 d-flex flex-wrap justify-content-center">
					<div 
					style="width: 100px; height: 100px;" 
					th:class="'d-flex justify-content-center align-items-center m-2 ' + (${number.isFizzbuzz() ? 'bg-success' : (number.isFizz() ? 'bg-primary' : (number.isBuzz() ? 'bg-danger' : 'bg-secondary'))})"
					th:each="number : ${numbers}">
						<span th:if="${number.isFizzbuzz()}">FizzBuzz</span>
						<span th:if="${number.isFizz()}">Fizz</span>
						<span th:if="${number.isBuzz()}">Buzz</span>
						<span 
						th:unless="${number.isFizzbuzz() || number.isFizz() || number.isBuzz()}" 
						th:text="${number.getId()}"></span>
					</div>
				</div>
			</div>
		</div>
		<!-- Bootstrap Bundle with Popper -->
 		<script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
	</body>
</html>
